metadata:
  purpose: "Financial statement extraction rules for EODHD fundamentals JSON."
  input_source: "outputs/raw_samples/fundamentals_*.json"
  line_output_file: "outputs/financial_statement_lines.csv"
  coverage_output_file: "outputs/financial_statement_coverage.csv"
  notes:
    - "Preserve EODHD raw period labels and add standardized period labels."
    - "Use source_symbol from the raw file name / requested symbol when available."
    - "Do not infer restatements yet; only preserve metadata needed for later checks."

statement_sections:
  income_statement:
    raw_path: "Financials.Income_Statement"
    eodhd_name: "Income_Statement"

  balance_sheet:
    raw_path: "Financials.Balance_Sheet"
    eodhd_name: "Balance_Sheet"

  cash_flow:
    raw_path: "Financials.Cash_Flow"
    eodhd_name: "Cash_Flow"

period_types:
  yearly:
    standard_period_type: "annual"
  quarterly:
    standard_period_type: "quarterly"

metadata_fields:
  - currency_symbol

quality_flag_rules:
  missing_numeric_value: true
  negative_revenue: true
  negative_assets: true
  missing_filing_date: true