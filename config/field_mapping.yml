    - General.CurrencyName
    raw_path: General.CurrencyCode
    category: metadata
    required: true
    description: Reported currency.
  sector:
    raw_paths:
    - General.Sector
    raw_path: General.Sector
    category: identity
    required: true
    description: Company sector.
  industry:
