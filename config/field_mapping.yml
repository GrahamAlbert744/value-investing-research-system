metadata:
  purpose: Fallback-aware mapping from normalized field names to EODHD raw fundamentals
    paths.
  source_file: outputs\eodhd_field_audit.csv
  notes:
  - raw_paths is the ordered fallback list.
  - raw_path is retained for backward compatibility.
  - Only paths found in outputs/eodhd_field_audit.csv are mapped.
mapped_fields:
  code:
    raw_paths:
    - General.Code
    raw_path: General.Code
    category: identity
    required: true
    description: Ticker code without exchange suffix.
  primary_ticker:
    raw_paths:
    - General.PrimaryTicker
    raw_path: General.PrimaryTicker
    category: identity
    required: false
    description: Primary ticker if provided by EODHD.
  ticker:
    raw_paths:
    - General.PrimaryTicker
    - General.Code
    raw_path: General.PrimaryTicker
    category: identity
    required: true
    description: Best available ticker identifier from fundamentals.
  name:
    raw_paths:
    - General.Name
    raw_path: General.Name
    category: identity
    required: true
    description: Company name.
  company_name:
    raw_paths:
    - General.Name
    raw_path: General.Name
    category: identity
    required: true
    description: Company name duplicate for downstream compatibility.
  exchange:
    raw_paths:
    - General.Exchange
    raw_path: General.Exchange
    category: identity
    required: true
    description: Exchange code or EODHD exchange identifier.
  security_type:
    raw_paths:
    - General.Type
    raw_path: General.Type
    category: identity
    required: true
    description: Security type such as Common Stock, ETF, Fund, etc.
  type:
    raw_paths:
    - General.Type
    raw_path: General.Type
    category: identity
    required: false
    description: Backward-compatible alias for security_type.
  country:
    raw_paths:
