metadata:
  purpose: "Transparent conservative value-investing scoring configuration."
  version: "0.2"
  notes:
    - "C6 removes neutral credit for missing metrics."
    - "Observed metrics are scored directly."
    - "Category scores are reweighted only if category coverage is at least 60%."
    - "Low-coverage categories are not reweighted because that can inflate scores."
    - "Do not use latest_debt_to_equity until debt fields are corrected; use latest_liabilities_to_assets for now."

score_model:
  total_points: 100

  category_scoring_policy:
    min_category_coverage_for_reweight: 0.60
    high_category_coverage: 0.85
    medium_category_coverage: 0.60
    low_category_coverage: 0.00

  score_confidence_policy:
    high_overall_coverage: 0.85
    medium_overall_coverage: 0.70
    low_overall_coverage: 0.00
    cap_to_medium_if_any_category_below: 0.60
    cap_to_low_if_sector_special_handling: true
    cap_to_low_if_summary_quality_flags_present: true

  categories:
    value:
      weight: 35
      metrics:
        - name: trailing_pe
          field: trailing_pe
          fallback_fields:
            - pe_ratio
          points: 10
          direction: lower_is_better
          thresholds:
            excellent: 10
            good: 15
            fair: 25
            weak: 40
            poor: 60

        - name: price_sales_ttm
          field: price_sales_ttm
          points: 7
          direction: lower_is_better
          thresholds:
            excellent: 1
            good: 2
            fair: 4
            weak: 7
            poor: 10

        - name: price_book_mrq
          field: price_book_mrq
          points: 6
          direction: lower_is_better
          thresholds:
            excellent: 1
            good: 2
            fair: 4
            weak: 7
            poor: 10

        - name: enterprise_value_ebitda
          field: enterprise_value_ebitda
          points: 7
          direction: lower_is_better
          thresholds:
            excellent: 6
            good: 10
            fair: 14
            weak: 20
            poor: 30

        - name: dividend_yield
          field: dividend_yield
          fallback_fields:
            - forward_annual_dividend_yield
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.04
            good: 0.025
            fair: 0.015
            weak: 0.005
            poor: 0

    growth:
      weight: 20
      metrics:
        - name: revenue_growth_yoy
          field: revenue_growth_yoy
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.15
            good: 0.08
            fair: 0.03
            weak: 0
            poor: -0.05

        - name: revenue_3yr_cagr
          field: revenue_3yr_cagr
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.12
            good: 0.07
            fair: 0.03
            weak: 0
            poor: -0.03

        - name: net_income_growth_yoy
          field: net_income_growth_yoy
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.15
            good: 0.08
            fair: 0.03
            weak: 0
            poor: -0.05

        - name: net_income_3yr_cagr
          field: net_income_3yr_cagr
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.12
            good: 0.07
            fair: 0.03
            weak: 0
            poor: -0.03

    quality:
      weight: 35
      metrics:
        - name: latest_net_margin
          field: latest_net_margin
          fallback_fields:
            - profit_margin
          points: 8
          direction: higher_is_better
          thresholds:
            excellent: 0.20
            good: 0.12
            fair: 0.07
            weak: 0.03
            poor: 0

        - name: latest_fcf_margin
          field: latest_fcf_margin
          points: 8
          direction: higher_is_better
          thresholds:
            excellent: 0.15
            good: 0.10
            fair: 0.05
            weak: 0.01
            poor: 0

        - name: return_on_equity_ttm
          field: return_on_equity_ttm
          points: 6
          direction: higher_is_better
          thresholds:
            excellent: 0.25
            good: 0.15
            fair: 0.10
            weak: 0.05
            poor: 0

        - name: return_on_assets_ttm
          field: return_on_assets_ttm
          points: 5
          direction: higher_is_better
          thresholds:
            excellent: 0.12
            good: 0.08
            fair: 0.04
            weak: 0.01
            poor: 0

        - name: net_income_positive_year_count
          field: net_income_positive_year_count
          points: 4
          direction: higher_is_better
          thresholds:
            excellent: 4
            good: 3
            fair: 2
            weak: 1
            poor: 0

        - name: free_cash_flow_positive_year_count
          field: free_cash_flow_positive_year_count
          points: 4
          direction: higher_is_better
          thresholds:
            excellent: 4
            good: 3
            fair: 2
            weak: 1
            poor: 0

    stability:
      weight: 10
      metrics:
        - name: beta
          field: beta
          points: 3
          direction: target_range
          target_range:
            min: 0.6
            max: 1.3
          thresholds:
            poor: 2.5

        - name: latest_liabilities_to_assets
          field: latest_liabilities_to_assets
          points: 3
          direction: lower_is_better
          thresholds:
            excellent: 0.30
            good: 0.50
            fair: 0.65
            weak: 0.80
            poor: 0.90

        - name: annual_period_count
          field: annual_period_count
          points: 2
          direction: higher_is_better
          thresholds:
            excellent: 5
            good: 4
            fair: 3
            weak: 2
            poor: 1

        - name: revenue_positive_year_count
          field: revenue_positive_year_count
          points: 2
          direction: higher_is_better
          thresholds:
            excellent: 4
            good: 3
            fair: 2
            weak: 1
            poor: 0

missing_value_policy:
  missing_metric_score: 0
  reweight_observed_metrics_only: true
  min_category_coverage_for_reweight: 0.60
  critical_missing_fields:
    - source_symbol
    - ticker
    - name
    - sector
    - market_capitalization

sector_special_handling:
  financials:
    matching_keywords:
      - financial
      - bank
      - insurance
      - capital markets
    confidence_cap: low
    reason: "Generic FCF, leverage, and revenue scoring can mislead for financial companies."

  reits:
    matching_keywords:
      - reit
      - real estate investment trust
    confidence_cap: low
    reason: "REITs require FFO/AFFO-based scoring."

  cyclicals:
    matching_keywords:
      - energy
      - materials
      - steel
      - chemicals
      - autos
      - airlines
      - shipping
      - semiconductor
    confidence_cap: medium
    reason: "Cyclicals need longer-cycle normalized earnings and margins."

ranking_policy:
  minimum_rankable_score: 50

outputs:
  all_scored_stocks: "outputs/all_scored_stocks.csv"
  scoring_metric_details: "outputs/scoring_metric_details.csv"
  rejected_stocks: "outputs/rejected_stocks.csv"